services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/os
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./latex-docs:/latex-docs
      - ./code-projects:/code-projects:ro
    command: sh start.sh

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
